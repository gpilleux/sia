version: '3.8'

services:
  # MCP Server for repo_indexer
  repo-indexer-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: repo-indexer-mcp
    environment:
      # Database connection (connects to existing indexer-db)
      DATABASE_URL: postgresql+asyncpg://indexer:indexer123@indexer-db:5432/repo_indexer
      
      # Gemini API key (set in .env or pass via docker compose up)
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    
    # Mount repo_indexer source code (from sibling directory)
    volumes:
      - ../../repo_indexer:/app/repo_indexer:ro
    
    # For stdio transport: use stdin_open + tty
    stdin_open: true
    tty: true
    
    # Depends on database being available
    depends_on:
      - indexer-db
    
    # Share network with existing repo_indexer stack
    networks:
      - repo-indexer-network
    
    # Restart policy
    restart: unless-stopped

  # Re-use existing indexer-db from repo_indexer
  # This is a reference - the actual service is defined in ../repo_indexer/docker-compose.yml
  indexer-db:
    image: timescale/timescaledb:latest-pg15
    container_name: indexer-db
    environment:
      POSTGRES_USER: indexer
      POSTGRES_PASSWORD: indexer123
      POSTGRES_DB: repo_indexer
    ports:
      - "5436:5432"
    volumes:
      - indexer-db-data:/var/lib/postgresql/data
    networks:
      - repo-indexer-network
    restart: unless-stopped

networks:
  repo-indexer-network:
    driver: bridge

volumes:
  indexer-db-data:
    external: true  # Use volume created by repo_indexer
